<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEST'IN - Historique d'Activités</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #38bdf8; 
            --gold: #facc15; 
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            color: var(--text-primary); 
        }

        .mobile-container { 
            width: 100%; 
            max-width: 430px; 
            margin: auto; 
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box; 
        }

        .header { 
            display: flex; 
            align-items: center; 
            gap: 15px;
            padding: 16px;
            flex-shrink: 0;
        }
        .back-btn { 
            font-size: 1.8em; 
            color: var(--text-primary); 
            text-decoration: none; 
        }
        .header h2 { margin:0; font-size: 1.2em; font-weight: 700; }

        #syncInfo {
            padding: 0 16px 12px 16px;
            font-size: 0.78em;
            color: var(--text-secondary);
            line-height: 1.5;
            flex-shrink: 0;
        }

        .filters { 
            display: flex; 
            gap: 8px; 
            overflow-x: auto;
            padding: 0 16px 16px 16px;
            flex-shrink: 0;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .filters::-webkit-scrollbar { display: none; }

        .filter-chip { 
            background: var(--card); 
            border: 1px solid #334155; 
            color: var(--text-secondary); 
            padding: 6px 12px; 
            border-radius: 10px; 
            font-size: 0.85em; 
            font-weight: 600;
            white-space: nowrap; 
            cursor: pointer; 
            transition: background-color 0.2s, color 0.2s;
        }
        .filter-chip.active { 
            background: var(--accent); 
            color: #fff; 
            border-color: var(--accent);
        }

        .timeline-container {
            overflow-y: auto;
            flex-grow: 1;
            padding: 0 16px;
        }

        .timeline { 
            position: relative; 
            padding-left: 25px; 
            border-left: 2px solid var(--card);
        }

        .activity-item { 
            position: relative; 
            background: var(--card); 
            padding: 16px; 
            border-radius: 16px; 
            margin-bottom: 16px; 
            border: 1px solid rgba(255,255,255,0.08);
        }
        .activity-item::before { 
            content: ''; 
            position: absolute; 
            left: -34px; 
            top: 20px; 
            width: 12px; 
            height: 12px; 
            background: var(--bg);
            border: 2px solid var(--accent);
            border-radius: 50%; 
        }

        .activity-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 8px; 
        }
        .activity-type { 
            font-size: 0.8em; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            color: var(--accent); 
        }
        .activity-date { 
            font-size: 0.75em; 
            color: var(--text-secondary); 
        }
        .activity-desc { 
            font-size: 0.95em; 
            line-height: 1.5; 
            color: var(--text-primary); 
        }

        .empty-state { 
            text-align: center; 
            padding-top: 100px; 
            color: var(--text-secondary); 
            font-style: italic; 
        }
        #loading-spinner { 
            text-align: center; 
            padding: 20px; 
            color: var(--gold); 
            font-size: 0.8em; 
        }
    </style>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="mobile-container">
    <div class="header">
        <a href="dashboard.html" class="back-btn">‹</a>
        <h2>Historique</h2>
    </div>

    <div id="syncInfo">Chargement...</div>

    <div class="filters" id="filterContainer">
        <div class="filter-chip active" onclick="filterLogs('ALL', this)">Tout</div>
        <div class="filter-chip" onclick="filterLogs('VENTE', this)">Ventes</div>
        <div class="filter-chip" onclick="filterLogs('ARTICLE', this)">Articles</div>
        <div class="filter-chip" onclick="filterLogs('ARCHIVE', this)">Archives</div>
        <div class="filter-chip" onclick="filterLogs('RESERVATION', this)">Réservations</div>
        <div class="filter-chip" onclick="filterLogs('LIVRAISON', this)">Livraison</div>
        <div class="filter-chip" onclick="filterLogs('SUPPORT', this)">Support</div>
    </div>

    <div class="timeline-container">
        <div id="loading-spinner">Chargement de l'historique...</div>
        <div class="timeline" id="timelineContainer"></div>
    </div>
</div>

<script>
    let allLogs = [];

    function updateSyncInfo() {
        const node = document.getElementById('syncInfo');
        const pending = JSON.parse(localStorage.getItem('bestin_pending_sync_count') || '0');
        const backendUnavailable = JSON.parse(localStorage.getItem('bestin_backend_unavailable') || 'false');

        if (!navigator.onLine) {
            node.innerText = "Historique local disponible hors-ligne.";
            return;
        }

        if (backendUnavailable && pending > 0) {
            node.innerText = `${pending} opération(s) locale(s) encore en attente serveur.`;
            return;
        }

        if (pending > 0) {
            node.innerText = `${pending} opération(s) en attente de synchronisation.`;
            return;
        }

        node.innerText = "Historique local à jour.";
    }

    async function initPage() {
        const container = document.getElementById('timelineContainer');
        const spinner = document.getElementById('loading-spinner');

        try {
            const logsFromDB = await localDB.getAll('activity_logs');

            allLogs = (logsFromDB || [])
                .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

            spinner.style.display = 'none';
            updateSyncInfo();
            renderLogs(allLogs);
        } catch (err) {
            spinner.innerText = "Erreur : " + err.message;
            console.error(err);
            container.innerHTML = '<div class="empty-state">Aucune activité enregistrée.</div>';
        }
    }

    function renderLogs(logs) {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = '';

        if (logs.length === 0) {
            container.innerHTML = '<div class="empty-state">Aucune activité pour ce filtre.</div>';
            return;
        }

        logs.forEach((log) => {
            const dateObj = new Date(log.created_at || Date.now());
            const dateStr = dateObj.toLocaleDateString('fr-FR', { day: 'numeric', month: 'short' });
            const timeStr = dateObj.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });

            const div = document.createElement('div');
            div.className = 'activity-item';
            div.innerHTML = `
                <div class="activity-header">
                    <span class="activity-type">${getIcon(log.type)} ${log.type || 'LOG'}</span>
                    <span class="activity-date">${dateStr} • ${timeStr}</span>
                </div>
                <div class="activity-desc">${log.description || ''}</div>
            `;
            container.appendChild(div);
        });
    }

    function getIcon(type) {
        switch(type) {
            case 'VENTE': return '💰';
            case 'ARTICLE': return '🧾';
            case 'ARCHIVE': return '🗂️';
            case 'RESERVATION': return '📅';
            case 'LIVRAISON': return '🚚';
            case 'SUPPORT': return '💬';
            case 'SECURITE': return '🔐';
            default: return '📝';
        }
    }

    function filterLogs(type, element) {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        element.classList.add('active');

        if (type === 'ALL') {
            renderLogs(allLogs);
        } else {
            const filtered = allLogs.filter(l => l.type === type);
            renderLogs(filtered);
        }
    }

    const waitForDB = setInterval(() => {
        if (typeof localDB !== 'undefined' && typeof db !== 'undefined' && db) {
            clearInterval(waitForDB);
            initPage();
        }
    }, 200);

    window.addEventListener('online', updateSyncInfo);
    window.addEventListener('offline', updateSyncInfo);
    window.addEventListener('bestin-sync-state', updateSyncInfo);
</script>

</body>
</html>
