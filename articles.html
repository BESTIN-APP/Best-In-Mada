<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEST'IN - Articles</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #38bdf8; 
            --gold: #facc15; 
            --orange: #f97316; 
            --gray: #64748b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
        }

        .mobile-view { 
            width: 100%; 
            max-width: 430px; 
            background-color: var(--bg); 
            height: 100vh;
            color: var(--text-primary); 
            display: flex; 
            flex-direction: column; 
            position: relative; 
        }

        .header { 
            padding: 16px 16px 12px 16px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            flex-shrink: 0;
        }
        .back-btn { 
            font-size: 1.8em; 
            cursor: pointer; 
            text-decoration: none; 
            color: var(--text-primary); 
            line-height: 1; 
        }
        
        #sync-banner { 
            display: none; 
            background: linear-gradient(to right, var(--orange), #d35400); 
            color: white; 
            font-size: 0.75em; 
            text-align: center; 
            padding: 10px; 
            font-weight: bold; 
            flex-shrink: 0;
        }

        .search-area { 
            padding: 0 16px 16px 16px; 
            flex-shrink: 0;
        }
        .search-bar { 
            display: flex; 
            background: var(--card); 
            border-radius: 14px; 
            padding: 14px; 
            align-items: center; 
            gap: 12px; 
            border: 1px solid #334155; 
        }
        .search-bar input { 
            background: none; 
            border: none; 
            color: var(--text-primary); 
            width: 100%; 
            outline: none; 
            font-size: 1em; 
        }

        .cat-list { 
            padding: 0 16px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            overflow-y: auto; 
            flex-grow: 1; 
            padding-bottom: 16px;
        }
        .cat-card {
            background: var(--card); 
            border-radius: 18px; 
            padding: 18px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.08); 
            cursor: pointer; 
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .cat-card:active { 
            transform: scale(0.98); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .cat-info { display: flex; align-items: center; gap: 15px; }
        .cat-icon { font-size: 1.5em; }
        .cat-name { font-weight: 600; font-size: 1em; color: var(--text-primary); }
        .cat-count { 
            font-size: 0.8em; 
            color: var(--accent); 
            font-weight: 700; 
            background: rgba(56, 189, 248, 0.1); 
            padding: 6px 12px; 
            border-radius: 10px; 
        }

        .add-btn { 
            position: sticky; 
            bottom: 25px;
            margin: 16px 16px 25px 16px;
            background: var(--accent); 
            color: #fff; 
            padding: 18px; 
            border-radius: 18px; 
            text-align: center; 
            font-weight: bold; 
            font-size: 1em;
            cursor: pointer; 
            text-decoration: none; 
            display: block; 
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3); 
            z-index: 10; 
            transition: background-color 0.3s, opacity 0.3s; 
            flex-shrink: 0;
        }
        .add-btn.locked { 
            background: var(--gray) !important; 
            opacity: 0.8; 
            cursor: not-allowed; 
            pointer-events: none; 
            box-shadow: none;
        }
    </style>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div class="mobile-view">
    <div id="sync-banner">🔄 Synchronisation intelligente en cours...</div>

    <div class="header">
        <a href="dashboard.html" class="back-btn">‹</a>
        <h1 style="margin: 0; font-size: 1.2em; font-weight: 700;">Mes Articles</h1>
        <div id="dot" style="width:10px; height:10px; border-radius:50%; background:gray"></div>
    </div>

    <div class="search-area">
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Rechercher une catégorie...">
        </div>
    </div>

    <h3 style="padding: 0 18px; margin: 0 0 16px 0; font-size: 0.8em; letter-spacing: 1px; color: var(--text-secondary); text-transform: uppercase; flex-shrink: 0;">Catégories</h3>

    <div id="catContainer" class="cat-list"></div>

    <a href="add_article.html" id="btnAddArticle" class="add-btn">+ NOUVEL ARTICLE</a>
</div>

<script>
    const CATEGORIES = [
        { id: "ALR", name: "ALIMENTATION & RESTAURATION", icon: "🍽️", aliases: ["ÉPICERIE & CONSOMMABLES", "ALIMENTATION : PPN", "RESTAURATION & GOURMANDISES", "EPI"] },
        { id: "MDA", name: "MODE & APPARENCE", icon: "👗", aliases: ["MODE & HABILLAGE", "MODE & TEXTILES", "MOD"] },
        { id: "BEH", name: "BEAUTÉ & HYGIÈNE", icon: "💄", aliases: ["BEAUTÉ & COSMÉTIQUES", "BEAUTE ET COSMETIQUE", "BCO"] },
        { id: "VEM", name: "VÉHICULES & MÉCANIQUE (AUTO/MOTO)", icon: "🏍️", aliases: ["AUTO & MOTO", "AUT"] },
        { id: "HTM", name: "HIGH-TECH & MULTIMÉDIA", icon: "📱", aliases: ["HIGH-TECH & ÉLECTRONIQUE", "ELECTRONIQUE & HIGH TECH", "HTE", "ELC"] },
        { id: "MAE", name: "MAISON & ÉQUIPEMENT", icon: "🏠", aliases: ["MAISON & DÉCORATION", "MAISON & DECO", "MDE", "HOM"] },
        { id: "CBR", name: "CONSTRUCTION & BRICOLAGE (QUINCAILLERIE)", icon: "🧰", aliases: ["BRICOLAGE & OUTILS", "BRI"] },
        { id: "SBE", name: "SANTÉ & BIEN-ÊTRE", icon: "🩺", aliases: [] },
        { id: "ENJ", name: "ENFANCE & JOUETS", icon: "🧸", aliases: ["ENFANTS & BÉBÉS", "ENF"] },
        { id: "FBS", name: "FOURNITURES DE BUREAU & SCOLAIRE", icon: "📚", aliases: [] },
        { id: "SPL", name: "SPORT & LOISIRS", icon: "⚽", aliases: [] },
        { id: "CUC", name: "CULTURE & CADEAUX", icon: "🎁", aliases: [] },
        { id: "SRV", name: "SERVICES (PRESTATIONS)", icon: "🛠️", aliases: [] },
        { id: "ENG", name: "ÉNERGIE & GAZ", icon: "🔥", aliases: [] },
        { id: "DIV", name: "DIVERS / AUTRES", icon: "📦", aliases: ["DIVERS"] }
    ];

    function getCachedSubscription() {
        return JSON.parse(localStorage.getItem('cache_abo') || 'null');
    }

    function hasActiveSubscription(abo) {
        if (!abo || abo.statut !== 'actif') return false;
        if (!abo.date_fin) return true;
        const end = new Date(abo.date_fin);
        end.setHours(23, 59, 59, 999);
        return Date.now() <= end.getTime();
    }

    function hasActiveProfileSubscription(currentProfile) {
        const endDate = new Date(currentProfile.subscription_until || currentProfile.expiration_date || currentProfile.date_expiration);
        if (Number.isNaN(endDate.getTime())) return false;
        endDate.setHours(23, 59, 59, 999);
        return Date.now() <= endDate.getTime();
    }

    function isTrialActive(currentProfile) {
        if (!currentProfile || !currentProfile.created_at) return false;
        const start = new Date(currentProfile.created_at);
        const end = new Date(start);
        end.setDate(end.getDate() + 10);
        end.setHours(23, 59, 59, 999);
        return Date.now() <= end.getTime();
    }

    function checkSubscription() {
        const prof = JSON.parse(localStorage.getItem('bestin_profile') || '{}');
        const btn = document.getElementById('btnAddArticle');
        if (!btn) return;

        const abo = getCachedSubscription();
        const allowed = hasActiveProfileSubscription(prof)
            || hasActiveSubscription(abo)
            || isTrialActive(prof);

        if (!allowed) {
            btn.innerText = "ABONNEMENT EXPIRÉ 🔒";
            btn.classList.add('locked');
            btn.style.background = "#6b7280";
            btn.onclick = (e) => {
                e.preventDefault();
                const goAbo = confirm("Votre accès est limité. Souhaitez-vous renouveler maintenant ?");
                if (goAbo) {
                    window.location.href = 'abonnement.html';
                }
            };
        } else {
            btn.innerText = "+ NOUVEL ARTICLE";
            btn.classList.remove('locked');
            btn.style.background = "";
        }
    }

    function updateSyncBanner() {
        const banner = document.getElementById('sync-banner');
        const pending = JSON.parse(localStorage.getItem('bestin_pending_sync_count') || '0');
        const backendUnavailable = JSON.parse(localStorage.getItem('bestin_backend_unavailable') || 'false');

        if (!navigator.onLine) {
            banner.style.display = "none";
            return;
        }

        if (pending > 0 || backendUnavailable) {
            banner.style.display = "block";
            banner.innerText = backendUnavailable
                ? "🔄 Données locales conservées • synchronisation en attente serveur..."
                : "🔄 Synchronisation intelligente en cours...";
            return;
        }

        banner.style.display = "none";
    }

    async function render() {
        const container = document.getElementById('catContainer');
        if (!container) return;

        const allArticles = await localDB.getAll('articles');
        const profile = JSON.parse(localStorage.getItem('bestin_profile') || '{}');

        container.innerHTML = CATEGORIES.map(cat => {
            const count = (allArticles || []).filter(a => {
                const aliases = [cat.name, cat.id, ...(cat.aliases || [])];
                const catMatch = aliases.includes(a.categorie) || aliases.includes(a.categories_id);
                const notArchived = a.archived === false || a.archived === undefined;
                const vendeurOk = !profile.vendeur_id || a.vendeur_id === profile.vendeur_id;
                return catMatch && notArchived && vendeurOk;
            }).length;

            return `
                <div class="cat-card" onclick="window.location.href='view_category.html?cat=${encodeURIComponent(cat.name)}'">
                    <div class="cat-info">
                        <span class="cat-icon">${cat.icon}</span>
                        <span class="cat-name">${cat.name}</span>
                    </div>
                    <span class="cat-count">${count}</span>
                </div>
            `;
        }).join('');
    }

    async function init() {
        if (!db) {
            setTimeout(init, 200);
            return;
        }

        checkSubscription();
        updateSyncBanner();
        await render();

        if (navigator.onLine && typeof refreshLocalCache === 'function') {
            updateSyncBanner();
            await refreshLocalCache();
            await render();
            checkSubscription();
            updateSyncBanner();
        }
    }

    document.getElementById('searchInput').oninput = function(e) {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.cat-card').forEach(c => {
            c.style.display = c.innerText.toLowerCase().includes(val) ? 'flex' : 'none';
        });
    };

    window.addEventListener('online', async () => {
        document.getElementById('dot').style.background = "#2ecc71";
        updateSyncBanner();
        await init();
    });

    window.addEventListener('offline', () => {
        document.getElementById('dot').style.background = "#f39c12";
        updateSyncBanner();
    });

    window.addEventListener('bestin-sync-state', updateSyncBanner);

    document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
