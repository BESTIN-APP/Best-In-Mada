<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEST'IN - Mon Profil</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --gold: #facc15;
            --danger: #f43f5e;
            --success: #22c55e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { margin:0; background:#000; color:var(--text-primary); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; display:flex; justify-content:center; }
        .mobile-container { width:100%; max-width:430px; height: 100vh; background:var(--bg); display: flex; flex-direction: column; box-sizing:border-box; }
        .header { display:flex; align-items:center; padding: 16px; flex-shrink: 0; }
        .back-btn { color:var(--text-primary); font-size:1.8em; text-decoration:none; margin-right:14px; }
        .header h2 { font-size: 1.2em; font-weight: 700; margin: 0; }
        .content-scroll { overflow-y: auto; padding: 0 16px 16px 16px; flex-grow: 1; }
        .card { background:var(--card); border-radius:18px; padding:16px; margin-bottom:16px; border:1px solid #334155; box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        .title { font-size:.8em; color:var(--text-secondary); margin-bottom:12px; font-weight:600; text-transform:uppercase; letter-spacing:.8px; }
        label { display:block; font-size:.85em; color: var(--text-secondary); margin:16px 0 8px 0; }
        input { width:100%; background:var(--bg); border:1px solid #334155; border-radius:12px; color:var(--text-primary); padding:14px; box-sizing:border-box; font-size: 1em; }
        .btn { width:100%; border:none; border-radius:14px; padding:16px; font-weight:700; color:#fff; background:var(--accent); margin-top:16px; text-decoration:none; display:block; text-align:center; box-sizing:border-box; font-size: 1em; cursor: pointer; }
        .btn-danger { background: rgba(244, 63, 94, 0.15); color:var(--danger); border:1px solid rgba(244, 63, 94, 0.2); }
        .muted { opacity:.8; font-size:.85em; color: var(--text-secondary); }
        .row { display:grid; grid-template-columns:1fr 1fr; gap:16px; text-align: center; }
        .row div div:last-child { font-size: 1.2em; font-weight: 700; margin-top: 4px; }
        #syncState { font-size: 0.8em; margin-top: 10px; text-align: center; color: var(--text-secondary); }
    </style>

    <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="mobile-container">
    <div class="header">
        <a href="dashboard.html" class="back-btn">‹</a>
        <h2>Mon Profil</h2>
    </div>

    <div class="content-scroll">
        <div class="card">
            <div class="title">Compte entreprise</div>
            <div class="row">
                <div>
                    <div class="muted">Vendeur ID</div>
                    <div id="vendeurId" style="color:var(--gold)">---</div>
                </div>
                <div>
                    <div class="muted">Jours restants</div>
                    <div id="aboDays">--</div>
                </div>
            </div>
            <div id="syncState">Chargement...</div>
        </div>

        <div class="card">
            <div class="title">Informations de l'entreprise</div>
            <label>Nom de l'enseigne</label>
            <input id="store_name" type="text" placeholder="Ex: Boutique Centre">

            <label>Adresse</label>
            <input id="location" type="text" placeholder="Ex: Antananarivo, Lot XX">

            <label>Contact entreprise</label>
            <input id="contact" type="tel" placeholder="Ex: 034 XX XXX XX">

            <button class="btn" onclick="updateProfile()">Mettre à jour</button>
        </div>

        <div class="card">
            <div class="title">Actions</div>
            <a class="btn" href="abonnement.html">Gérer mon abonnement</a>
            <a class="btn" href="reset-password.html" style="margin-top: 10px;">Réinitialiser mon mot de passe</a>
        </div>

        <button class="btn btn-danger" onclick="logout()">Déconnexion</button>
    </div>
</div>

<script>
let currentProfile = null;
let currentAbo = null;

function renderSyncState() {
    const pending = JSON.parse(localStorage.getItem('bestin_pending_sync_count') || '0');
    const backendUnavailable = JSON.parse(localStorage.getItem('bestin_backend_unavailable') || 'false');
    const node = document.getElementById('syncState');

    if (backendUnavailable && pending > 0) {
        node.innerText = `${pending} modification(s) sauvegardée(s) localement. Synchronisation en attente.`;
        node.style.color = 'var(--gold)';
        return;
    }

    if (pending > 0) {
        node.innerText = `${pending} modification(s) en attente de synchronisation.`;
        node.style.color = 'var(--gold)';
        return;
    }

    node.innerText = navigator.onLine ? 'Données synchronisées' : 'Mode hors-ligne actif';
    node.style.color = navigator.onLine ? 'var(--success)' : 'var(--text-secondary)';
}

function renderData(data, aboData = null) {
    currentProfile = data || currentProfile || {};
    currentAbo = aboData || currentAbo || null;

    document.getElementById('vendeurId').innerText = currentProfile.vendeur_id || '---';
    document.getElementById('store_name').value = currentProfile.shop_name || '';
    document.getElementById('location').value = currentProfile.adresse_boutique || '';
    document.getElementById('contact').value = currentProfile.phone || '';

    const targetDate = new Date(
        currentAbo?.date_fin ||
        currentProfile.subscription_until ||
        currentProfile.expiration_date ||
        currentProfile.date_expiration ||
        Date.now()
    );

    const days = Math.max(0, Math.ceil((targetDate - new Date()) / 86400000));
    const node = document.getElementById('aboDays');
    node.innerText = String(days);
    node.style.color = days <= 3 ? 'var(--danger)' : 'var(--success)';

    renderSyncState();
}

async function init() {
    const cached = JSON.parse(localStorage.getItem('bestin_profile') || '{}');
    const cachedAbo = JSON.parse(localStorage.getItem('cache_abo') || 'null');

    // ✅ Offline-first : afficher local immédiatement
    if (cached.id) {
        currentProfile = cached;
        currentAbo = cachedAbo;
        renderData(cached, cachedAbo);
    }

    const { data: { session } } = await _sb.auth.getSession();

    // ✅ Si offline et profil local existe -> ne pas rediriger
    if (!session) {
        if (!navigator.onLine && cached.id) {
            renderSyncState();
            return;
        }
        location.assign('login.html');
        return;
    }

    if (navigator.onLine) {
        if (typeof refreshLocalCache === 'function') {
            await refreshLocalCache();
        }
        const freshProfile = JSON.parse(localStorage.getItem('bestin_profile') || '{}');
        const freshAbo = JSON.parse(localStorage.getItem('cache_abo') || 'null');
        renderData(freshProfile, freshAbo);
    } else {
        // Session OK mais offline: rester sur cache local
        renderSyncState();
    }
}

async function updateProfile() {
    const { data: { session } } = await _sb.auth.getSession();
    if (!session) {
        alert('Session expirée. Veuillez vous reconnecter.');
        location.assign('login.html');
        return;
    }

    const baseProfile = currentProfile || JSON.parse(localStorage.getItem('bestin_profile') || '{}');
    if (!baseProfile.id) {
        alert('Profil local introuvable.');
        return;
    }

    const now = new Date().toISOString();
    const updates = {
        id: baseProfile.id,
        shop_name: document.getElementById('store_name').value.trim(),
        adresse_boutique: document.getElementById('location').value.trim(),
        phone: document.getElementById('contact').value.trim(),
        updated_at: now,
        last_updated_at: now,
        user_id: baseProfile.id,
        vendeur_id: baseProfile.vendeur_id || null
    };

    const updatedProfile = { ...baseProfile, ...updates };

    try {
        if (typeof localDB !== 'undefined') {
            await localDB.save('profiles_cache', updatedProfile);
            await localDB.addToSyncQueue('profiles', 'UPDATE', updatedProfile);
        }

        localStorage.setItem('bestin_profile', JSON.stringify(updatedProfile));
        localStorage.setItem(`bestin_profile_snapshot_${updatedProfile.id}`, JSON.stringify(updatedProfile));
        localStorage.setItem('shop_name', updates.shop_name);
        localStorage.setItem('shop_address', updates.adresse_boutique);
        localStorage.setItem('shop_tel', updates.phone);

        currentProfile = updatedProfile;
        renderData(updatedProfile, currentAbo);

        alert(`Mise à jour enregistrée localement.
La synchronisation serveur sera faite automatiquement dès que possible.`);

        if (navigator.onLine && typeof syncData === 'function') {
            await syncData();
            if (typeof refreshLocalCache === 'function') await refreshLocalCache({ force: true });
        }
    } catch (err) {
        console.error(err);
        alert('Erreur lors de l\'enregistrement local du profil.');
    }
}

async function logout() {
    if (!confirm('Êtes-vous sûr de vouloir vous déconnecter ?')) return;

    try {
        await _sb.auth.signOut();
    } catch (_) {}

    // ✅ Persistance offline-first : ne jamais purger IndexedDB/local snapshot.
    // On enlève seulement les pointeurs de session active pour éviter fuite visuelle multi-user.
    localStorage.removeItem('bestin_profile');
    localStorage.removeItem('cache_abo');
    localStorage.removeItem('shop_name');
    localStorage.removeItem('shop_address');
    localStorage.removeItem('shop_tel');

    // Optionnel: reset affichage sync local courant
    localStorage.removeItem('bestin_pending_sync_count');
    localStorage.removeItem('bestin_backend_unavailable');
    localStorage.removeItem('bestin_sync_error_message');

    location.assign('login.html');
}

window.addEventListener('online', renderSyncState);
window.addEventListener('offline', renderSyncState);
window.addEventListener('bestin-sync-state', renderSyncState);

init();
</script>
</body>
</html>
