<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST'IN - Inscription</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050a18">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        :root { --bg: #050a18; --card: #16213e; --accent: #2d62ff; --gold: #D4AF37; }
        body { margin: 0; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .mobile-view { width: 100%; max-width: 430px; background-color: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        
        /* HEADER FIXE */
        .fixed-header { padding: 30px 30px 15px 30px; flex-shrink: 0; text-align: center; background: var(--bg); z-index: 10; border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .logo { width: 70px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--gold); }
        h2 { margin: 0; color: var(--gold); font-size: 1.4em; }

        /* CONTENU DEFILANT */
        .scroll-content { flex-grow: 1; overflow-y: auto; padding: 20px 30px 80px 30px; }

        .form-group { margin-bottom: 15px; position: relative; }
        label { display: block; font-size: 0.7em; color: #8a99af; margin-bottom: 6px; font-weight: bold; text-transform: uppercase; }
        input, select { width: 100%; background: #0b1426; border: 1px solid #2d3748; padding: 14px; border-radius: 12px; color: white; box-sizing: border-box; font-size: 1em; outline: none; }
        input:focus { border-color: var(--accent); }

        .btn-reg { width: 100%; background: var(--accent); color: white; border: none; padding: 16px; border-radius: 14px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-reg:disabled { background: #2d3748; opacity: .7; cursor: not-allowed; }
        .toggle-btn { position: absolute; right: 15px; top: 35px; cursor: pointer; font-size: 1.2em; z-index: 10; }
        #signature { text-align: center; padding: 30px; font-size: 12px; color: rgba(212, 175, 55, 0.5); font-weight: bold; }
    </style>

</head>
<body>
    <div class="mobile-view">
        <div class="fixed-header">
            <img src="BESTIN.png" class="logo" alt="Logo">
            <h2>Créer un compte</h2>
        </div>

        <div class="scroll-content">
            <div class="form-group"><label>Nom complet du vendeur</label><input type="text" id="full_name"></div>
            <div class="form-group"><label>Nom de l'entreprise</label><input type="text" id="shop_name"></div>
            <div class="form-group"><label>Adresse de l'entreprise</label><input type="text" id="adresse"></div>
            <div class="form-group"><label>Contact (Téléphone)</label><input type="text" id="phone"></div>
            <div class="form-group"><label>Email professionnel</label><input type="email" id="email"></div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" id="password" placeholder="Min 6 caractères">
                <span class="toggle-btn" id="eyeIcon">👁️</span>
            </div>

            <div class="form-group">
                <label>Question de sécurité</label>
                <select id="security_question">
                    <option value="">-- Sélectionner --</option>
                    <option value="École primaire">École primaire</option>
                    <option value="Rue d'enfance">Rue d'enfance</option>
                    <option value="Modèle 1ère voiture">Modèle 1ère voiture</option>
                    <option value="Prénom grand-père maternel">Prénom grand-père maternel</option>
                    <option value="Professeur CM2">Professeur CM2</option>
                </select>
            </div>

            <div class="form-group">
                <label>Réponse secrète</label>
                <input type="text" id="security_answer" placeholder="Votre réponse">
            </div>

            <button class="btn-reg" id="btn_submit" onclick="handleSignUp()">S'ENREGISTRER</button>

            <p style="text-align:center; font-size:0.85em; margin-top:20px; color:#8a99af;">
                Déjà inscrit ? <a href="login.html" style="color:var(--gold); text-decoration:none; font-weight:bold;">Se connecter</a>
            </p>

        </div>
    </div>

    <script>
        document.getElementById('eyeIcon').onclick = function() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
            this.innerText = p.type === 'password' ? '👁️' : '🙈';
        };

        async function handleSignUp() {
            const btn = document.getElementById('btn_submit');
            if (!navigator.onLine) { alert("Connexion internet requise."); return; }

            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const fullName = document.getElementById('full_name').value.trim();
            const shopName = document.getElementById('shop_name').value.trim();
            const securityQuestion = document.getElementById('security_question').value;
            const securityAnswer = document.getElementById('security_answer').value.trim().toLowerCase();

            if (!email || !password || !fullName || !securityAnswer || !securityQuestion) {
                alert('Veuillez remplir tous les champs.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Enregistrement...';

            try {
                const { data: authData, error: authError } = await _sb.auth.signUp({ email, password });
                if (authError) throw authError;

                const profileData = {
                    id: authData.user.id,
                    full_name: fullName,
                    vendeur_id: 'BEST-' + Math.floor(1000 + Math.random() * 9000),
                    shop_name: shopName,
                    adresse_boutique: document.getElementById('adresse').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    email: email,
                    security_question: securityQuestion,
                    security_answer: securityAnswer,
                    subscription_until: new Date(Date.now() + 10 * 86400000).toISOString(),
                    updated_at: new Date().toISOString()
                };

                // Utilisation de UPSERT pour éviter le conflit avec le Trigger SQL
                const { error: profError } = await _sb.from('profiles').upsert([profileData], { onConflict: 'id' });
                if (profError) throw profError;

                alert("Compte créé ! Vérifiez vos emails pour confirmer votre inscription.");
                window.location.assign('login.html');

            } catch (err) {
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerText = "S'ENREGISTRER";
            }
        }
    </script>
</body>
</html>
