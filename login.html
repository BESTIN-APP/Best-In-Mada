<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST'IN - Connexion</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050a18">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        :root { --bg: #050a18; --card: #16213e; --accent: #2d62ff; --gold: #D4AF37; }
        body { background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; display: flex; justify-content: center; height: 100vh; overflow: hidden; margin: 0; }
        .login-box { width: 100%; max-width: 430px; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }
        
        .fixed-header { padding: 40px 30px 15px 30px; text-align: center; flex-shrink: 0; background: var(--bg); border-bottom: 1px solid rgba(212, 175, 55, 0.1); }
        .logo { width: 75px; border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--gold); }
        h2 { margin: 0; font-size: 1.6em; color: white; }

        .scroll-content { flex-grow: 1; overflow-y: auto; padding: 25px 30px 60px 30px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 0.75em; color: #8a99af; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #2d3748; background: #0b1426; color: white; box-sizing: border-box; outline: none; font-size: 1em; }
        
        .pass-container { position: relative; width: 100%; }
        .toggle-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2em; z-index: 10; opacity: 0.7; }

        .remember-box { display: flex; align-items: flex-start; gap: 12px; margin: 25px 0; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .remember-box input { width: 22px; height: 22px; cursor: pointer; flex-shrink: 0; }
        .remember-box label { margin: 0; color: #cbd5e0; font-size: 0.85em; cursor: pointer; }

        button { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 14px; font-weight: bold; cursor: pointer; font-size: 1em; }
        .footer-links { text-align: center; margin-top: 30px; font-size: 0.85em; color: #8a99af; }
        .footer-links a { color: var(--gold); text-decoration: none; font-weight: bold; }
    </style>

</head>
<body>
    <div class="login-box">
        <div class="fixed-header">
            <img src="BESTIN.png" class="logo" alt="Logo">
            <h2>Connexion</h2>
        </div>

        <div class="scroll-content">
            <div class="form-group">
                <label>Email professionnel</label>
                <input type="email" id="email" placeholder="votre@email.com">
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <div class="pass-container">
                    <input type="password" id="password" placeholder="••••••••">
                    <span class="toggle-eye" id="eyeLogin">👁️</span>
                </div>
            </div>

            <div class="remember-box">
                <input type="checkbox" id="stay_logged" checked>
                <label for="stay_logged"><b>Rester connecté</b><br>Cochez pour ouvrir l'application même sans connexion internet.</label>
            </div>

            <button id="btn_login" onclick="handleLogin()">SE CONNECTER</button>

            <div class="footer-links">
                <a href="reset-password.html">Mot de passe oublié ?</a><br><br>
                Nouveau ? <a href="register.html">Créer un compte</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('eyeLogin').onclick = function() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
            this.innerText = p.type === 'password' ? '👁️' : '🙈';
        };

        async function checkAutoLogin() {
            const stay = localStorage.getItem('bestin_stay_logged') === 'true';
            const profile = JSON.parse(localStorage.getItem('bestin_profile') || '{}');
            if (stay && profile.id) { window.location.assign('dashboard.html'); }
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const stay = document.getElementById('stay_logged').checked;
            const btn = document.getElementById('btn_login');

            if (!navigator.onLine) { alert("Connexion internet requise pour la première connexion."); return; }

            btn.disabled = true;
            btn.innerText = "Connexion...";

            try {
                const { data, error } = await _sb.auth.signInWithPassword({ email, password });
                if (error) throw error;

                const { data: prof } = await _sb.from('profiles').select('*').eq('id', data.user.id).single();
                
                localStorage.setItem('bestin_profile', JSON.stringify(prof));
                localStorage.setItem('bestin_stay_logged', stay ? 'true' : 'false');

                window.location.assign('dashboard.html');
            } catch (err) {
                alert("Erreur : " + err.message);
                btn.disabled = false;
                btn.innerText = "SE CONNECTER";
            }
        }
        checkAutoLogin();
    </script>
</body>
</html>
