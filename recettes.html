<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEST'IN - Recettes Finales</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #38bdf8; 
            --gold: #facc15; 
            --success: #22c55e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            margin: 0; 
            background-color: #000; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; 
            color: var(--text-primary); 
            overflow-x: hidden; 
        }

        .mobile-container { 
            width: 100%; 
            max-width: 430px; 
            margin: auto; 
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box; 
        }

        .header { 
            display: flex; 
            align-items: center; 
            padding: 16px;
            flex-shrink: 0;
        }
        .back-btn { 
            font-size: 1.8em; 
            color: var(--text-primary); 
            text-decoration: none; 
            margin-right: 15px; 
        }
        .header h2 { margin:0; font-size: 1.2em; font-weight: 700; }

        .content-scroll {
            overflow-y: auto;
            padding: 0 16px 16px 16px;
            flex-grow: 1;
        }

        .filter-box { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 18px; 
            margin-bottom: 16px; 
            border: 1px solid #334155; 
        }
        .filter-box .stat-label { margin-bottom: 12px; }

        .date-inputs { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
        }
        
        input[type="date"] { 
            background: var(--bg); 
            border: 1px solid #334155; 
            color: var(--text-primary); 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 0.9em; 
            color-scheme: dark; 
            outline: none; 
        }

        .btn-action { 
            width: 100%;
            margin-top: 16px;
            padding: 12px; 
            border-radius: 12px; 
            border: none; 
            background: var(--accent); 
            color: #fff; 
            font-weight: bold; 
            font-size: 0.9em; 
            cursor: pointer; 
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat-card { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 18px; 
            border: 1px solid #334155; 
            text-align: center; 
        }
        
        .stat-label { 
            font-size: 0.8em; 
            color: var(--text-secondary); 
            text-transform: uppercase; 
            font-weight: 600; 
            margin-bottom: 8px; 
            display: block; 
        }
        .stat-value { 
            font-size: 1.5em; 
            font-weight: 700; 
            letter-spacing: 1px; 
            color: var(--text-primary);
        }

        .chart-section { 
            background: var(--card); 
            padding: 16px; 
            border-radius: 18px; 
            border: 1px solid #334155; 
        }
        .chart-container { 
            height: 220px; 
            position: relative; 
            margin-top: 10px; 
        }
        
        #debug-info { 
            font-size: 0.75em; 
            color: var(--text-secondary); 
            margin-top: 16px; 
            text-align: center; 
            line-height: 1.5;
        }

        #printableRecettes { display: none; }
        @media print {
            body * { visibility: hidden; }
            #printableRecettes, #printableRecettes * { visibility: visible; }
            #printableRecettes {
                display: block !important; position: absolute; left: 0; top: 0; width: 100%;
                color: black !important; background: white !important; padding: 20px; font-family: 'Courier New', monospace;
            }
        }
    </style>

    <link rel="stylesheet" href="style.css">

</head>
<body>

<div id="printableRecettes">
    <div style="text-align:center; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 15px;">
        <h2 style="margin:0; text-transform: uppercase;">RAPPORT DES RECETTES</h2>
        <p id="pRecetteRange" style="margin:5px 0;"></p>
    </div>
    <div style="margin-bottom: 15px; font-size: 0.9em;">
        <p><strong>Total période :</strong> <span id="pRecetteTotal"></span> Ar</p>
    </div>
    <table style="width:100%; border-collapse: collapse;">
        <thead>
            <tr style="text-align:left; border-bottom: 1px solid #000;">
                <th>DATE</th>
                <th style="text-align:right">MONTANT</th>
            </tr>
        </thead>
        <tbody id="pRecetteBody"></tbody>
    </table>
</div>

<div class="mobile-container">
    <div class="header">
        <a href="dashboard.html" class="back-btn">‹</a>
        <h2>Recettes Réelles</h2>
    </div>

    <div class="content-scroll">
        <div class="filter-box">
            <span class="stat-label">Analyse de la période</span>
            <div class="date-inputs">
                <input type="date" id="start_date">
                <input type="date" id="end_date">
            </div>
            <button class="btn-action" type="button" onclick="telechargerRecettes()">TÉLÉCHARGER PDF</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Aujourd'hui</span>
                <div class="stat-value" id="today_total">0 Ar</div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Période</span>
                <div class="stat-value" id="period_total">0 Ar</div>
            </div>
        </div>

        <div class="chart-section">
            <span class="stat-label">Courbe des revenus</span>
            <div class="chart-container">
                <canvas id="revenueChart"></canvas>
            </div>
        </div>

        <div id="debug-info">Chargement...</div>
    </div>
</div>

<script>
    let chartInstance = null;
    let allTransactions = [];
    let profile = null;
    let articlePrixMap = new Map();
    let filteredTransactions = [];

    function getProfile() {
        if (!profile) {
            profile = JSON.parse(localStorage.getItem('bestin_profile') || '{}');
        }
        return profile || {};
    }

    function formatDate(value) {
        if (!value) return '';
        return String(value).split('T')[0];
    }

    function getVenteAmount(vente) {
        if (vente.total_paye !== undefined && vente.total_paye !== null) {
            return parseFloat(vente.total_paye) || 0;
        }
        const unit = parseFloat(vente.prix_unitaire || 0);
        if (!Number.isNaN(unit) && unit > 0) {
            return unit * (parseFloat(vente.quantite || 0) || 0);
        }
        const mappedPrix = articlePrixMap.get(vente.article_id);
        if (mappedPrix && mappedPrix > 0) {
            return mappedPrix * (parseFloat(vente.quantite || 0) || 0);
        }
        const prix = parseFloat(vente.prix || 0);
        const qty = parseFloat(vente.quantite || 0);
        if (!Number.isNaN(prix) && prix > 0 && qty > 0) {
            return prix * qty;
        }
        return parseFloat(vente.montant || 0) || 0;
    }

    async function loadData() {
        const info = document.getElementById('debug-info');
        const currentProfile = getProfile();

        if (!currentProfile.id || !currentProfile.vendeur_id) {
            window.location.href = 'login.html';
            return;
        }

        try {
            const [ventes, articles] = await Promise.all([
                localDB.getAll('ventes'),
                localDB.getAll('articles')
            ]);

            articlePrixMap = new Map((articles || []).map((a) => [a.id, parseFloat(a.prix || 0) || 0]));

            const data = (ventes || [])
                .filter((v) => v.vendeur_id === currentProfile.vendeur_id)
                .filter((v) => v.statut === 'VENDRE' || v.statut === 'VENTE')
                .filter((v) => v.livraison_statut !== 'RETOUR_CLIENT')
                .filter((v) => {
                    if (!v.fulfillment_method) return true;
                    if (v.fulfillment_method === 'LIVRAISON') {
                        return v.livraison_statut === 'LIVRE_PAYE';
                    }
                    if (v.fulfillment_method === 'RETRAIT_BOUTIQUE') {
                        return v.livraison_statut === 'RETIRE_BOUTIQUE';
                    }
                    return true;
                })
                .map((v) => ({
                    date: formatDate(v.created_at),
                    montant: getVenteAmount(v)
                }))
                .filter((v) => v.date && v.montant > 0);

            allTransactions = data;

            info.innerText = navigator.onLine
                ? `${allTransactions.length} transaction(s) validée(s) chargée(s).`
                : `${allTransactions.length} transaction(s) validée(s) disponibles hors-ligne.`;

            updateDisplay();
        } catch (err) {
            console.error(err);
            info.innerText = "Erreur de lecture locale.";
        }
    }

    function updateDisplay() {
        const start = document.getElementById('start_date').value;
        const end = document.getElementById('end_date').value;
        const today = new Date().toISOString().split('T')[0];

        const totalToday = allTransactions
            .filter((t) => t.date === today)
            .reduce((s, t) => s + t.montant, 0);

        const filtered = allTransactions.filter((t) =>
            (!start || t.date >= start) && (!end || t.date <= end)
        );

        filteredTransactions = filtered;

        const totalPeriod = filtered.reduce((s, t) => s + t.montant, 0);

        document.getElementById('today_total').innerText = `${totalToday.toLocaleString()} Ar`;
        document.getElementById('period_total').innerText = `${totalPeriod.toLocaleString()} Ar`;

        renderChart(filtered);
    }

    function telechargerRecettes() {
        const start = document.getElementById('start_date').value;
        const end = document.getElementById('end_date').value;
        const totalPeriod = filteredTransactions.reduce((s, t) => s + t.montant, 0);
        const rangeLabel = `${start || '...'} → ${end || '...'}`;

        document.getElementById('pRecetteRange').innerText = `Période : ${rangeLabel}`;
        document.getElementById('pRecetteTotal').innerText = totalPeriod.toLocaleString();
        document.getElementById('pRecetteBody').innerHTML = filteredTransactions.map((t) => `
            <tr>
                <td style="padding: 6px 0;">${t.date}</td>
                <td style="text-align:right">${t.montant.toLocaleString()} Ar</td>
            </tr>
        `).join('') || '<tr><td colspan="2" style="padding:10px 0;">Aucune donnée</td></tr>';

        window.print();
    }

    function renderChart(data) {
        const dailyMap = data.reduce((acc, t) => {
            acc[t.date] = (acc[t.date] || 0) + t.montant;
            return acc;
        }, {});

        const labels = Object.keys(dailyMap).sort();
        const values = labels.map((l) => dailyMap[l]);
        const ctx = document.getElementById('revenueChart').getContext('2d');

        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels.map((l) => l.split('-').reverse().slice(0, 2).join('/')),
                datasets: [{
                    data: values,
                    borderColor: 'rgba(250, 204, 21, 1)',
                    backgroundColor: 'rgba(250, 204, 21, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 2,
                    pointBackgroundColor: 'rgba(250, 204, 21, 1)',
                    pointRadius: 0,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#000',
                        titleColor: '#94a3b8',
                        bodyColor: '#f1f5f9',
                        padding: 10,
                        cornerRadius: 8
                    }
                },
                scales: {
                    y: {
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: '#94a3b8', font: { size: 10 } }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8', font: { size: 10 } }
                    }
                }
            }
        });
    }

    const d = new Date();
    document.getElementById('end_date').value = d.toISOString().split('T')[0];
    d.setDate(1);
    document.getElementById('start_date').value = d.toISOString().split('T')[0];

    document.getElementById('start_date').addEventListener('change', updateDisplay);
    document.getElementById('end_date').addEventListener('change', updateDisplay);

    const waitForDB = setInterval(() => {
        if (typeof localDB !== 'undefined' && typeof db !== 'undefined' && db) {
            clearInterval(waitForDB);
            loadData();
        }
    }, 200);

    window.addEventListener('online', loadData);
</script>
</body>
</html>
