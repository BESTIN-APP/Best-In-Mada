<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEST'IN - Équipe Livreurs</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --gold: #facc15; --danger: #f43f5e; --text-primary: #f1f5f9; --text-secondary: #94a3b8; }
        body { margin:0; background:#000; color:var(--text-primary); font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; display:flex; justify-content:center; height: 100vh; overflow: hidden; }
        .mobile-container { width:100%; max-width:430px; height: 100vh; background:var(--bg); display: flex; flex-direction: column; }
        
        .header { display:flex; align-items:center; padding: 16px; flex-shrink: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .back-btn { color:var(--text-primary); font-size:1.8em; text-decoration:none; margin-right:14px; }
        .header h2 { font-size: 1.2em; font-weight: 700; margin: 0; }

        .content-scroll { overflow-y: auto; padding: 16px 16px 100px 16px; flex-grow: 1; }

        .card { background:var(--card); border-radius:18px; padding:16px; margin-bottom:20px; border: 1px solid #334155; }
        .title { font-size:.8em; color:var(--gold); margin-bottom:15px; font-weight:700; text-transform:uppercase; letter-spacing:1px; }
        label { display:block; font-size:.75em; color: var(--text-secondary); margin:12px 0 6px 0; font-weight: bold; }
        input, select { width:100%; background:var(--bg); border:1px solid #334155; border-radius:12px; color:var(--text-primary); padding:12px; box-sizing:border-box; outline:none; font-size: 1em; }
        
        .pass-container { position: relative; width: 100%; }
        .toggle-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2em; z-index: 10; }

        .btn { width:100%; border:none; border-radius:12px; padding:16px; font-weight:bold; color:#fff; background:var(--accent); margin-top:15px; cursor: pointer; }

        .livreur-item { background:var(--bg); border:1px solid #334155; padding:12px; border-radius:14px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
        .btn-del { background: rgba(244, 63, 94, 0.15); color: var(--danger); border: none; padding: 8px 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>

    <link rel="stylesheet" href="style.css">

</head>
<body>
<div class="mobile-container">
    <div class="header">
        <a href="dashboard.html" class="back-btn">‹</a>
        <h2>Équipe Livreurs</h2>
    </div>

    <div class="content-scroll">
        <div class="card">
            <div class="title">Nouveau Livreur</div>
            <label>Nom complet</label><input id="liv_nom" type="text" placeholder="Ex: Jean Livreur">
            <label>Email</label><input id="liv_email" type="email" placeholder="livreur@mail.com">
            <label>Téléphone</label><input id="liv_phone" type="tel" placeholder="034 00 000 00">
            
            <label>Question de sécurité</label>
            <select id="liv_quest">
                <option value="École primaire">École primaire</option>
                <option value="Rue d'enfance">Rue d'enfance</option>
                <option value="Modèle 1ère voiture">Modèle 1ère voiture</option>
                <option value="Prénom grand-père maternel">Prénom grand-père maternel</option>
                <option value="Professeur CM2">Professeur CM2</option>
            </select>
            <label>Réponse</label><input id="liv_ans" type="text" placeholder="Réponse secrète">

            <label>Mot de passe</label>
            <div class="pass-container">
                <input id="liv_pass" type="password" placeholder="Min 6 caractères">
                <span class="toggle-eye" id="eyeLivreur">👁️</span>
            </div>

            <button class="btn" id="btnCreate" onclick="handleCreateLivreur()">CRÉER LE COMPTE LIVREUR</button>
        </div>

        <div class="title">Liste des Livreurs</div>
        <div id="liv_list">Chargement...</div>
    </div>
</div>

<script>
    document.getElementById('eyeLivreur').onclick = function() {
        const p = document.getElementById('liv_pass');
        p.type = p.type === 'password' ? 'text' : 'password';
        this.innerText = p.type === 'password' ? '👁️' : '🙈';
    };

    async function handleCreateLivreur() {
        const nom = document.getElementById('liv_nom').value.trim();
        const email = document.getElementById('liv_email').value.trim().toLowerCase();
        const quest = document.getElementById('liv_quest').value;
        const ans = document.getElementById('liv_ans').value.trim().toLowerCase();
        const pass = document.getElementById('liv_pass').value;
        const btn = document.getElementById('btnCreate');

        if (!nom || !email || pass.length < 6) { alert("Champs invalides."); return; }
        if (!navigator.onLine) { alert("Connexion internet requise."); return; }

        btn.disabled = true;
        btn.innerText = "Création...";

        try {
            const isolated = supabase.createClient(_supabaseUrl, _supabaseKey, { auth: { persistSession: false } });
            const { data: authData, error: authError } = await isolated.auth.signUp({ email, password: pass });
            if (authError) throw authError;

            // Appel RPC respectant tes 4 paramètres d'origine
            const { error: rpcError } = await _sb.rpc('create_child_livreur_account', {
                p_livreur_id: authData.user.id,
                p_full_name: nom,
                p_phone: document.getElementById('liv_phone').value.trim(),
                p_security_answer: ans
            });

            if (rpcError) throw rpcError;

            // Ajout de la question de sécurité via UPDATE séparé (pour ne pas toucher au SQL)
            await _sb.from('profiles').update({ security_question: quest }).eq('id', authData.user.id);

            alert("Livreur ajouté !");
            location.reload();
        } catch (err) {
            alert("Erreur : " + err.message);
            btn.disabled = false;
            btn.innerText = "CRÉER LE COMPTE LIVREUR";
        }
    }

    async function loadLivreurs() {
        const { data: { session } } = await _sb.auth.getSession();
        if (!session) return;
        const { data, error } = await _sb.from('profiles').select('id, full_name, email').eq('account_status', 'ACTIVE').eq('parent_owner_id', session.user.id);
        const list = document.getElementById('liv_list');
        if (error) { list.innerText = "Erreur réseau."; return; }
        list.innerHTML = data.map(l => `<div class="livreur-item"><div><b>${l.full_name}</b><br><small>${l.email}</small></div><button class="btn-del" onclick="disableLiv('${l.id}')">X</button></div>`).join('') || "Aucun livreur.";
    }

    async function disableLiv(id) {
        if (!confirm("Désactiver ?")) return;
        await _sb.from('profiles').update({ account_status: 'DISABLED' }).eq('id', id);
        loadLivreurs();
    }
    loadLivreurs();
</script>
</body>
</html>
