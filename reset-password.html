<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BEST'IN - Récupération</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
    <style>
        :root { --bg: #050a18; --card: #16213e; --accent: #2d62ff; --gold: #D4AF37; }
        body { margin: 0; background-color: #000; font-family: 'Segoe UI', sans-serif; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .box { width: 90%; max-width: 400px; padding: 30px; background: var(--card); border-radius: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        
        label { display: block; text-align: left; font-size: 0.7em; color: #8a99af; margin-top: 15px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; padding: 14px; margin: 8px 0; border-radius: 12px; border: 1px solid #1e293b; background: #0b1426; color: white; box-sizing: border-box; outline: none; transition: 0.3s; font-size: 16px; }
        input:focus, select:focus { border-color: var(--accent); }

        .pass-container { position: relative; width: 100%; }
        .toggle-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 1.2em; z-index: 10; opacity: 0.7; user-select: none; }

        button { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; letter-spacing: 1px; }
        button:disabled { background: #2d3748; opacity: 0.5; cursor: not-allowed; }
        
        .footer-link { margin-top: 25px; display: block; color: var(--gold); text-decoration: none; font-size: 0.8em; font-weight: bold; }
    </style>

</head>
<body>
    <div class="box">
        <h2 style="color: var(--gold); margin: 0;">Récupération</h2>
        <p style="font-size:0.8em; color:#8a99af; margin-bottom: 25px;">Accès direct après validation</p>

        <label>Email du compte</label>
        <input type="email" id="email" placeholder="nom@boutique.com">

        <label>Question Secrète</label>
        <select id="security_question">
            <option value="">-- Sélectionner --</option>
            <option value="École primaire">École primaire</option>
            <option value="Rue d'enfance">Rue d'enfance</option>
            <option value="Modèle 1ère voiture">Modèle 1ère voiture</option>
            <option value="Prénom grand-père maternel">Prénom grand-père maternel</option>
            <option value="Professeur CM2">Professeur CM2</option>
        </select>

        <label>Réponse secrète</label>
        <input type="text" id="answer" placeholder="Votre réponse secrète">

        <label>Nouveau Mot de Passe</label>
        <div class="pass-container">
            <input type="password" id="new_pass" placeholder="6 caractères minimum">
            <span class="toggle-eye" id="eyeReset">👁️</span>
        </div>

        <button id="reset_btn" onclick="handleDirectReset()">RÉINITIALISER MAINTENANT</button>
        
        <a href="login.html" class="footer-link">← Retour à la connexion</a>
    </div>

    <script>
        // Logique de l'oeil pour afficher/cacher le mot de passe
        document.getElementById('eyeReset').onclick = function() {
            const p = document.getElementById('new_pass');
            p.type = p.type === 'password' ? 'text' : 'password';
            this.innerText = p.type === 'password' ? '👁️' : '🙈';
        };

        async function handleDirectReset() {
            const email = document.getElementById('email').value.trim().toLowerCase();
            const question = document.getElementById('security_question').value;
            const answer = document.getElementById('answer').value.trim().toLowerCase();
            const newPass = document.getElementById('new_pass').value;
            const btn = document.getElementById('reset_btn');

            if (!email || !question || !answer || newPass.length < 6) {
                alert("Veuillez remplir tous les champs (Mot de passe : 6 caractères min).");
                return;
            }

            if (!navigator.onLine) {
                alert("Une connexion internet est requise pour cette opération.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Validation...";

            try {
                // Appel RPC à la fonction SQL force_password_reset_direct
                const { data, error } = await _sb.rpc('force_password_reset_direct', {
                    p_email: email, 
                    p_question: question, 
                    p_answer: answer, 
                    p_new_password: newPass
                });

                if (error) throw error;

                if (data && data.success) {
                    alert("Succès ! Votre mot de passe a été mis à jour. Vous pouvez maintenant vous connecter.");
                    window.location.assign('login.html');
                } else {
                    alert("Échec : " + (data.message || "Les informations ne correspondent pas."));
                }
            } catch (err) {
                console.error(err);
                alert("Erreur technique : " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "RÉINITIALISER MAINTENANT";
            }
        }
    </script>
</body>
</html>
